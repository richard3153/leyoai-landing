<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect fill="url(#bg)" rx="40" width="200" height="200"/>
  <!-- 左侧 L 形，象征 LEYO -->
  <text x="28" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="800" fill="url(#text)">L</text>
  <!-- 右侧小圆点，象征 AI 智能 -->
  <circle cx="155" cy="50" r="20" fill="rgba(255,255,255,0.3)"/>
  <circle cx="172" cy="85" r="13" fill="rgba(255,255,255,0.5)"/>
  <circle cx="148" cy="72" r="8" fill="rgba(255,255,255,0.7)"/>
</svg>
