  <path d="M122 240 L122 280 Q122 288 130 288 L158 288" stroke="url(#lPath)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="155" cy="245" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="165" cy="260" r="4" fill="rgba(255,255,255,0.65)"/>
  <circle cx="148" cy="263" r="3" fill="rgba(255,255,255,0.55)"/>
  <!-- Title text -->
  <text x="210" y="285" font-family="'Inter', Arial, sans-serif" font-size="100" font-weight="bold" fill="white">LeyoAI</text>
