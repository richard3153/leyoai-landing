<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Icon mark -->
  <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#iconGrad)"/>
  <!-- Stylized L inside icon -->
  <path d="M18 14 L18 42 L38 42" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- AI dots: 3 dots representing intelligence/nodes -->
  <circle cx="40" cy="20" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="46" cy="30" r="3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="36" cy="30" r="2.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Connection lines between dots -->
  <line x1="40" y1="20" x2="46" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="40" y1="20" x2="36" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="36" y1="30" x2="46" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <!-- Brand text -->
  <text x="68" y="30" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="#1e1b4b" letter-spacing="-0.5">
    Leyo
  </text>
  <text x="162" y="30" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="url(#textGrad)" letter-spacing="-0.5">
    AI
  </text>
  <!-- Tagline -->
  <text x="68" y="48" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748b" letter-spacing="2">
    MODEL AS A SERVICE
  </text>
</svg>
