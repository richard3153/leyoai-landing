<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="gradC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Icon - L 字母变形 -->
  <g transform="translate(15, 15)">
    <!-- 背景（深色） -->
    <rect width="80" height="90" rx="16" fill="#1e1b4b"/>
    
    <!-- L 字母艺术化 -->
    <path d="M20 15 L20 70 L55 70 L55 60 L30 60 L30 15 Z" fill="url(#gradC)"/>
    
    <!-- AI 装饰点 -->
    <circle cx="45" cy="25" r="5" fill="#a78bfa"/>
    <circle cx="60" cy="35" r="4" fill="#c4b5fd"/>
    <circle cx="60" cy="50" r="4" fill="#c4b5fd"/>
    
    <!-- 连接线 -->
    <line x1="45" y1="25" x2="60" y2="35" stroke="#e9d5ff" stroke-width="2"/>
    <line x1="60" y1="35" x2="60" y2="50" stroke="#e9d5ff" stroke-width="2"/>
  </g>
  
  <!-- Logo Text（浅色） -->
  <text x="110" y="52" font-family="SF Pro Display, -apple-system, sans-serif" font-size="40" font-weight="600" fill="#f8fafc">
    Leyo<tspan fill="url(#gradC)">AI</tspan>
  </text>
  <text x="110" y="75" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" fill="#a78bfa" letter-spacing="3">
    LEYO INFORMATION
  </text>
</svg>